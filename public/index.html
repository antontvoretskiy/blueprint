<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blueprint</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #020915;
        color: #f8fbff;
        display: grid;
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        place-items: center;
      }

      main {
        align-items: center;
        display: flex;
        flex-direction: column;
        max-width: 720px;
        text-align: center;
      }

      img {
        display: block;
        height: auto;
        margin: 0 0 32px;
        max-width: min(420px, 82vw);
        width: 100%;
      }

      p {
        font-size: 18px;
        line-height: 1.6;
        margin: 0;
      }

      .visually-hidden {
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        height: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="visually-hidden">Blueprint</h1>
      <img src="/assets/blueprint-logo.png" alt="Blueprint logo" />
      <p>The isolated local development environment is running.</p>
    </main>
  </body>
</html>
