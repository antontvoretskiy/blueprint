name: ${COMPOSE_PROJECT_NAME:-blueprint-dev}

services:
  app:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_APP_PORT:-3231}:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - blueprint

  api:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_API_PORT:-8231}:80"
    volumes:
      - ./public/api:/usr/share/nginx/html:ro
    networks:
      - blueprint

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blueprint}
      POSTGRES_USER: ${POSTGRES_USER:-blueprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blueprint_dev_password}
    ports:
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_POSTGRES_PORT:-55461}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blueprint

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_REDIS_PORT:-6406}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blueprint

  mailpit:
    image: axllent/mailpit:v1.30.1
    restart: unless-stopped
    ports:
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_MAILPIT_WEB_PORT:-8046}:8025"
      - "${BLUEPRINT_BIND_HOST:-127.0.0.1}:${BLUEPRINT_MAILPIT_SMTP_PORT:-1046}:1025"
    networks:
      - blueprint

networks:
  blueprint:

volumes:
  postgres-data:
  redis-data:
